<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/restaurants.css">
    <title>서울 맛집 리스트</title>
</head>
<body>
    <header class="hero">
        <div class="hero__inner">
            <p class="hero__eyebrow">SEOUL FOOD GUIDE</p>
            <h1 class="hero__title">서울 맛집 리스트 🍜</h1>
            <p class="hero__subtitle">사진 · 주소 · 연락처를 한눈에. 서울에서 꼭 가봐야 할 맛집을 모았습니다.</p>
            <div class="search">
                <i class="search__icon">🔎</i>
                <input id="search-input" type="text" placeholder="맛집 이름, 지역, 메뉴로 검색하세요" />
            </div>
            <div class="filters" id="filters">
                <button class="filter filter--active" data-category="all">전체</button>
                <button class="filter" data-category="한식">한식</button>
                <button class="filter" data-category="고기">고기</button>
                <button class="filter" data-category="면">면 요리</button>
                <button class="filter" data-category="카페">카페·디저트</button>
                <button class="filter" data-category="양식">양식</button>
            </div>
        </div>
    </header>

    <main class="container">
        <p class="result-count" id="result-count"></p>
        <section class="grid" id="restaurant-grid"></section>
        <p class="no-result" id="no-result" hidden>검색 결과가 없습니다. 다른 키워드로 찾아보세요.</p>
    </main>

    <footer class="footer">
        <p>© 2026 서울 맛집 리스트 · 사진은 예시 이미지입니다.</p>
    </footer>

    <script src="js/restaurants.js"></script>
</body>
</html>
